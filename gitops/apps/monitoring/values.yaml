# Helm values for kube-prometheus-stack
# Tuned for small Hetzner Talos clusters

# Prometheus configuration
prometheus:
  prometheusSpec:
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi
    retention: 7d
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: hcloud-volumes
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 10Gi
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule

# Grafana configuration
grafana:
  enabled: true
  persistence:
    enabled: true
    storageClassName: hcloud-volumes
    size: 5Gi
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
  defaultDashboardsEnabled: true
  defaultDashboardsTimezone: utc
  ingress:
    enabled: false

# Alertmanager configuration
alertmanager:
  config:
    route:
      receiver: pushover
      group_by: ['alertname', 'namespace']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - receiver: "null"
          matchers:
            - alertname = "Watchdog"
        - receiver: "null"
          matchers:
            - alertname = "InfoInhibitor"
    receivers:
      - name: "null"
      - name: pushover
        pushover_configs:
          - user_key_file: /etc/alertmanager/secrets/alertmanager-pushover/user-key
            token_file: /etc/alertmanager/secrets/alertmanager-pushover/api-token
            priority: '{{ if eq .Status "firing" }}0{{ else }}-1{{ end }}'
            title: '{{ .Status | toUpper }}: {{ .CommonLabels.alertname }}'
  alertmanagerSpec:
    secrets:
      - alertmanager-pushover
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule

# Node exporter (runs on all nodes)
nodeExporter:
  enabled: true
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule

# kube-state-metrics
kubeStateMetrics:
  enabled: true

# Prometheus Operator
prometheusOperator:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule

# Disable components not easily scrapeable on Talos
kubeEtcd:
  enabled: false  # Talos etcd requires mTLS for metrics
kubeScheduler:
  enabled: false  # Talos binds to localhost
kubeControllerManager:
  enabled: false  # Talos binds to localhost
kubeProxy:
  enabled: false  # Cilium replaces kube-proxy

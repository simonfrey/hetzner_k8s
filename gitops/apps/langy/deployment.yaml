apiVersion: apps/v1
kind: Deployment
metadata:
  name: langy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: langy
  template:
    metadata:
      labels:
        app: langy
    spec:
      volumes:
        - name: migrations
          emptyDir: {}
      initContainers:
        - name: copy-migrations
          image: ghcr.io/simonfrey/langy:latest
          command: ["cp", "-r", "/migrations/.", "/shared-migrations/"]
          volumeMounts:
            - name: migrations
              mountPath: /shared-migrations
        - name: migrate
          image: migrate/migrate:latest
          command:
            - "migrate"
            - "-path=/migrations"
            - "-database=$(DATABASE_URL)"
            - "up"
          volumeMounts:
            - name: migrations
              mountPath: /migrations
          env:
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: langy.langy-postgres.credentials.postgresql.acid.zalan.do
                  key: username
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: langy.langy-postgres.credentials.postgresql.acid.zalan.do
                  key: password
            - name: DATABASE_URL
              value: "postgres://$(PGUSER):$(PGPASSWORD)@langy-postgres:5432/langy?sslmode=require"
      containers:
        - name: langy
          image: ghcr.io/simonfrey/langy:latest
          command: ["langy", "serve"]
          ports:
            - containerPort: 8080
          env:
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: langy.langy-postgres.credentials.postgresql.acid.zalan.do
                  key: username
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: langy.langy-postgres.credentials.postgresql.acid.zalan.do
                  key: password
            - name: DATABASE_URL
              value: "postgres://$(PGUSER):$(PGPASSWORD)@langy-postgres:5432/langy?sslmode=require"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: langy-secrets
                  key: jwt-secret
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: langy-secrets
                  key: gemini-api-key
        - name: image-watcher
          image: alpine:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              HEALTH=/tmp/healthy
              INTERVAL=60
              get_digest() {
                TOKEN=$(wget -qO- "https://ghcr.io/token?scope=repository:simonfrey/langy:pull" | sed -n 's/.*"token":"\([^"]*\)".*/\1/p')
                wget -qS --header="Authorization: Bearer $TOKEN" --header="Accept: application/vnd.oci.image.index.v1+json" \
                  "https://ghcr.io/v2/simonfrey/langy/manifests/latest" 2>&1 | sed -n 's/.*docker-content-digest: *\(.*\)/\1/p' | tr -d '\r'
              }
              INITIAL=$(get_digest)
              touch $HEALTH
              while true; do
                sleep $INTERVAL
                CURRENT=$(get_digest)
                if [ -n "$CURRENT" ] && [ "$CURRENT" != "$INITIAL" ]; then
                  rm -f $HEALTH
                  sleep infinity
                fi
              done
          livenessProbe:
            exec:
              command: ["cat", "/tmp/healthy"]
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 1m
              memory: 8Mi
            limits:
              memory: 16Mi

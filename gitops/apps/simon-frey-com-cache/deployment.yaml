apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-cache
  template:
    metadata:
      labels:
        app: nginx-cache
    spec:
      shareProcessNamespace: true
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: cache-vol
              mountPath: /var/cache/nginx
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
        - name: cache-purger
          image: python:3.12-alpine
          command:
            - python3
            - -c
            - |
              import http.server, subprocess, os, signal
              class H(http.server.BaseHTTPRequestHandler):
                  def do_POST(self):
                      if self.path == "/purge":
                          subprocess.run(["sh", "-c", "rm -rf /var/cache/nginx/*"])
                          # Send SIGHUP to nginx master process
                          for pid in os.listdir("/proc"):
                              try:
                                  with open(f"/proc/{pid}/cmdline", "r") as f:
                                      if "nginx: master" in f.read():
                                          os.kill(int(pid), signal.SIGHUP)
                                          break
                              except Exception:
                                  pass
                          self.send_response(200)
                          self.end_headers()
                          self.wfile.write(b"purged")
                      else:
                          self.send_response(404)
                          self.end_headers()
                  def log_message(self, *args): pass
              http.server.HTTPServer(("", 8080), H).serve_forever()
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: cache-vol
              mountPath: /var/cache/nginx
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 64Mi
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-cache-config
        - name: cache-vol
          emptyDir:
            sizeLimit: 2Gi

# Helm values for Traefik on Talos/Hetzner
#
# Install with:
#   helm install traefik traefik/traefik \
#     --namespace traefik --create-namespace \
#     -f manifests/traefik-values.yaml

# DaemonSet for reliable scheduling on single-node clusters
deployment:
  kind: DaemonSet

# Tolerate control plane taint (workers can scale to 0)
tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule

# Proxy protocol for Hetzner LB (TCP passthrough)
ports:
  web:
    port: 80
    proxyProtocol:
      trustedIPs:
        - 10.0.0.0/8
        - 127.0.0.1/32
    forwardedHeaders:
      trustedIPs:
        - 10.0.0.0/8
        - 127.0.0.1/32
  websecure:
    port: 443
    proxyProtocol:
      trustedIPs:
        - 10.0.0.0/8
        - 127.0.0.1/32
    forwardedHeaders:
      trustedIPs:
        - 10.0.0.0/8
        - 127.0.0.1/32

# Hetzner LB annotations
service:
  annotations:
    load-balancer.hetzner.cloud/network-zone: eu-central
    load-balancer.hetzner.cloud/use-private-ip: "true"
    load-balancer.hetzner.cloud/uses-proxyprotocol: "true"
    load-balancer.hetzner.cloud/name: "hetzner-k8s-lb"

# Set as default IngressClass
ingressClass:
  enabled: true
  isDefaultClass: true

# Access logging with real client IP
logs:
  access:
    enabled: true
    fields:
      headers:
        defaultMode: keep

# Disable cross-namespace IngressRoute for security
providers:
  kubernetesCRD:
    allowCrossNamespace: false

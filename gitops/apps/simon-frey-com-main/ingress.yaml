apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-https
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-files-prefix
spec:
  replacePathRegex:
    regex: ^/files/(.*)
    replacement: /public/$1
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: simon-frey-com
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.middlewares: simon-frey-com-redirect-https@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - simon-frey.com
      secretName: simon-frey-com-tls
    - hosts:
        - files-admin.simon-frey.com
      secretName: files-admin-simon-frey-com-tls
  rules:
    - host: simon-frey.com
      http:
        paths:
          - path: /blog
            pathType: Prefix
            backend:
              service:
                name: nginx-cache
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nginx-cache
                port:
                  number: 80
    - host: files-admin.simon-frey.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: minio-console
                port:
                  number: 9001
---
# Separate Ingress for /files to apply strip-prefix middleware
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: simon-frey-com-files
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.middlewares: simon-frey-com-redirect-https@kubernetescrd,simon-frey-com-strip-files-prefix@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - simon-frey.com
      secretName: simon-frey-com-tls
  rules:
    - host: simon-frey.com
      http:
        paths:
          - path: /files
            pathType: Prefix
            backend:
              service:
                name: minio-api
                port:
                  number: 9000

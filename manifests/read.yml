apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ai-read-everything-except-secrets
rules:
  # 1. Core API Group (The critical one)
  # explicitly listing resources to exclude 'secrets'
  - apiGroups: [""]
    resources: 
      - bindings
      - componentstatuses
      - configmaps
      - endpoints
      - events
      - limitranges
      - namespaces
      - nodes
      - persistentvolumeclaims
      - persistentvolumes
      - pods
      - pods/log           # <--- Added: Allows reading logs
      - pods/status        # <--- Added: Allows reading status specifically
      - podtemplates
      - replicationcontrollers
      - resourcequotas
      - serviceaccounts
      - services
    verbs: ["get", "list", "watch"]

  # 2. All other common API Groups
  # It is safe to wildcard '*' resources here because Secrets live in the Core group above.
  - apiGroups: 
      - "apps"
      - "autoscaling"
      - "batch"
      - "argoproj.io"
      - "cronjob"
      - "extensions"
      - "policy"                    # <--- Added: PDBs, PSPs
      - "networking.k8s.io"
      - "rbac.authorization.k8s.io"
      - "storage.k8s.io"
      - "apiextensions.k8s.io"      # <--- Added: CRDs
      - "admissionregistration.k8s.io"
      - "metrics.k8s.io"            # <--- Added: Metrics server
      - "discovery.k8s.io"          # <--- Added: EndpointSlices
    resources: ["*"]
    verbs: ["get", "list", "watch"]

  # 3. Non-Resource URLs (Optional but recommended for full visibility)
  # Allows checking healthz, version, and metrics endpoints
  - nonResourceURLs: ["*"]
    verbs: ["get"]
---
apiVersion: v1
kind: Namespace
metadata:
  name: debug-access-ns
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-debugger
  namespace: debug-access-ns
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ai-debugger-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ai-read-everything-except-secrets
subjects:
  - kind: ServiceAccount
    name: ai-debugger
    namespace: debug-access-ns
---
apiVersion: v1
kind: Secret
metadata:
  name: ai-debugger-token
  namespace: debug-access-ns
  annotations:
    kubernetes.io/service-account.name: "ai-debugger"
type: kubernetes.io/service-account-token


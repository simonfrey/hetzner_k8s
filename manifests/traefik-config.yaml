# Traefik HelmChartConfig to enable proxy protocol
# Applied by scripts/post-deploy.sh after cluster provisioning.
apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  valuesContent: |-
    # Enable proxy protocol on entrypoints
    ports:
      web:
        port: 80
        exposedPort: 80
        expose:
          default: true
        protocol: TCP
        proxyProtocol:
          trustedIPs:
            # Hetzner Load Balancer IPs (internal network)
            - 10.0.0.0/8
            - 127.0.0.1/32
        forwardedHeaders:
          trustedIPs:
            - 10.0.0.0/8
            - 127.0.0.1/32
      websecure:
        port: 443
        exposedPort: 443
        expose:
          default: true
        protocol: TCP
        proxyProtocol:
          trustedIPs:
            - 10.0.0.0/8
            - 127.0.0.1/32
        forwardedHeaders:
          trustedIPs:
            - 10.0.0.0/8
            - 127.0.0.1/32
        tls:
          enabled: true

    # Log real client IPs
    logs:
      general:
        level: INFO
      access:
        enabled: true
        fields:
          headers:
            defaultMode: keep
            names:
              X-Forwarded-For: keep
              X-Real-IP: keep

    # Provider configuration - cross-namespace DISABLED for security
    providers:
      kubernetesCRD:
        enabled: true
        allowCrossNamespace: false
      kubernetesIngress:
        enabled: true
        publishedService:
          enabled: true

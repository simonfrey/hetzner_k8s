# Helm values for victoria-metrics-k8s-stack
# Tuned for small Hetzner Talos clusters

# VictoriaMetrics Single (replaces Prometheus)
vmsingle:
  spec:
    retentionPeriod: "7d"
    storage:
      storageClassName: hcloud-volumes
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 10Gi
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        memory: 1Gi

# VMAgent (scrapes metrics, sends to VMSingle)
vmagent:
  spec:
    selectAllByDefault: true
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 256Mi

# VMAlert (evaluates rules, sends to VMAlertmanager)
vmalert:
  spec:
    selectAllByDefault: true
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 256Mi

# VMAlertmanager (routes alerts to Pushover)
alertmanager:
  enabled: true
  spec:
    selectAllByDefault: true
    secrets:
      - alertmanager-pushover
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 64Mi
  config:
    route:
      receiver: pushover
      group_by: ['alertname', 'namespace']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - receiver: "null"
          matchers:
            - alertname = "Watchdog"
        - receiver: "null"
          matchers:
            - alertname = "InfoInhibitor"
        - receiver: "null"
          matchers:
            - alertname = "KubePdbNotEnoughHealthyPods"
            - poddisruptionbudget =~ ".*critical-op-pdb"
    receivers:
      - name: "null"
      - name: pushover
        pushover_configs:
          - user_key_file: /etc/vm/secrets/alertmanager-pushover/user-key
            token_file: /etc/vm/secrets/alertmanager-pushover/api-token
            priority: '{{ if eq .Status "firing" }}0{{ else }}-1{{ end }}'
            title: '{{ .Status | toUpper }}: {{ .CommonLabels.alertname }}'

# Grafana (datasource auto-pointed to VMSingle)
grafana:
  enabled: true
  persistence:
    enabled: true
    storageClassName: hcloud-volumes
    size: 5Gi
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi
      cpu: 500m
  defaultDashboardsEnabled: true
  defaultDashboardsTimezone: utc
  ingress:
    enabled: false

# VM Operator
victoria-metrics-operator:
  env:
    - name: VM_VMAGENTDEFAULT_USEDEFAULTRESOURCES
      value: "false"
    - name: VM_VMALERTDEFAULT_USEDEFAULTRESOURCES
      value: "false"
    - name: VM_VMSINGLEDEFAULT_USEDEFAULTRESOURCES
      value: "false"
    - name: VM_VMALERTMANAGER_USEDEFAULTRESOURCES
      value: "false"
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 256Mi
      cpu: 500m

# Node exporter (runs on all nodes)
prometheus-node-exporter:
  enabled: true
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule

# kube-state-metrics
kube-state-metrics:
  enabled: true

# Disable Talos-incompatible components
kubeEtcd:
  enabled: false
kubeScheduler:
  enabled: false
kubeControllerManager:
  enabled: false
kubeProxy:
  enabled: false

# Default recording/alerting rules
defaultRules:
  create: true
